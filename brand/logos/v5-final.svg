<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 100">
  <!-- PALESTRA v5: Bold P with chevron BREAKING through the bowl -->
  <!-- The triangle's top vertex extends above the bowl boundary -->
  <!-- Communicates: upward force, breaking limits, earned mastery -->
  <g transform="translate(8, 5)">
    <!-- P body: stem + bowl -->
    <path d="
      M 0 90 L 0 0 L 58 0
      C 78 0 90 14 90 30
      C 90 46 78 60 58 60
      L 20 60 L 20 90 Z
    " fill="#18181B"/>
    <!-- Bowl counter (white space) -->
    <path d="
      M 20 12 L 54 12
      C 68 12 76 20 76 30
      C 76 40 68 48 54 48
      L 20 48 Z
    " fill="#FAFAFA"/>
    <!-- Indigo chevron: BREAKS above the bowl boundary -->
    <!-- Top vertex at y=-4 (above the P's top edge at y=0) -->
    <!-- Bottom vertices sit inside the counter -->
    <polygon points="30,46 47,-4 64,46" fill="#4F46E5"/>
  </g>
  <!-- Wordmark -->
  <text x="116" y="74" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="52" fill="#18181B" letter-spacing="4">PALESTRA</text>
</svg>
